name: Update File Headers

on:
  push:
    paths:
      - "**.c"
      - "**.h"

  # Manual trigger — lets you process an entire folder from the GitHub UI
  workflow_dispatch:
    inputs:
      folder:
        description: "Folder to process (e.g. A_Book_On_C/Chapter_7). Leave empty for entire repo."
        required: false
        default: ""

jobs:
  update-headers:
    runs-on: ubuntu-latest

    # Prevent the commit this action makes from re-triggering itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Detect target C/H files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: find all .c/.h files in the given folder (or whole repo)
            SEARCH_ROOT="${{ github.event.inputs.folder }}"
            SEARCH_ROOT="${SEARCH_ROOT:-.}"   # default to repo root if empty
            echo "Manual run — scanning: $SEARCH_ROOT"
            find "$SEARCH_ROOT" -type f \( -name "*.c" -o -name "*.h" \) \
              ! -path "*/.git/*" > changed_files.txt
          else
            # Push trigger: only process files changed in this commit
            git diff --name-only --diff-filter=d HEAD~1 HEAD \
              | grep -E '\.(c|h)$' > changed_files.txt || true
          fi

          echo "Files to process:"
          cat changed_files.txt
          echo "files=$(cat changed_files.txt | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Update file headers
        if: steps.changed.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUTHOR_NAME: ${{ github.actor }}
        run: |
          python .github/scripts/update_headers.py changed_files.txt

      - name: Commit updated headers
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if the script actually changed something
          if git diff --quiet; then
            echo "No header changes needed."
          else
            git add -A
            git commit -m "chore: update file headers [skip ci]"
            git push
          fi